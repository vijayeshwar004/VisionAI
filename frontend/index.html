<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Composition Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="custom.css">
    <meta name="description" content="Intelligent analysis of photography composition rules including rule of thirds, leading lines, and balance.">

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX compilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Axios for API calls -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel" data-type="module">
const { useState } = React;

function App() {
    const [file, setFile] = useState(null);
    const [preview, setPreview] = useState(null);
    const [loading, setLoading] = useState(false);
    const [result, setResult] = useState(null);
    const [dragActive, setDragActive] = useState(false);
    const [error, setError] = useState(null);

    const handleFileChange = (e) => {
        const selectedFile = e.target.files[0];
        if (selectedFile) {
            setFile(selectedFile);
            setPreview(URL.createObjectURL(selectedFile));
            setResult(null);
            setError(null);
        }
    };

    const handleDrag = (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.type === "dragenter" || e.type === "dragover") setDragActive(true);
        else if (e.type === "dragleave") setDragActive(false);
    };

    const handleDrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setDragActive(false);
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
            const droppedFile = e.dataTransfer.files[0];
            setFile(droppedFile);
            setPreview(URL.createObjectURL(droppedFile));
            setResult(null);
            setError(null);
        }
    };

    const handleUpload = async () => {
        if (!file) return;
        setLoading(true);
        setError(null);

        const formData = new FormData();
        formData.append("image", file);

        try {
            const response = await axios.post("http://127.0.0.1:8080/api/analyze", formData, {
                headers: { "Content-Type": "multipart/form-data" }
            });
            setResult(response.data);
        } catch (err) {
            console.error("Error uploading photo:", err);
            const msg = err.response?.data?.error || err.message || "Failed to reach Spring Boot Backend! Make sure it is running on :8080.";
            setError(msg);
        } finally {
            setLoading(false);
        }
    };

    const handleReset = () => {
        setFile(null);
        setPreview(null);
        setResult(null);
        setError(null);
    };

    return (
        <React.Fragment>
            <header className="navbar">
                <div className="logo">Vision<span>AI</span></div>
                <nav>
                    <a href="#analysis">Analysis</a>
                    <a href="#suggestions">Suggestions</a>
                    {result && <button className="btn-primary" onClick={handleReset}>Upload New Photo</button>}
                </nav>
            </header>

            <main className="container">
                {/* Upload Section - shown when no result */}
                {!result && (
                    <section className="upload-hero">
                        <div className="upload-hero-text">
                            <div className="tag">Full-Stack React + Spring Boot</div>
                            <h1>Intelligent Photo Evaluation</h1>
                            <p>Upload your image to be processed by our Spring Boot backend. We'll store it securely in a database and return a dynamic composition score.</p>
                        </div>

                        <div
                            className={`drop-zone ${dragActive ? "drag-active" : ""} ${preview ? "has-preview" : ""}`}
                            onDragEnter={handleDrag}
                            onDragLeave={handleDrag}
                            onDragOver={handleDrag}
                            onDrop={handleDrop}
                        >
                            {preview ? (
                                <div className="preview-container">
                                    <img src={preview} alt="Preview" className="preview-img" />
                                    <div className="preview-overlay">
                                        <p className="preview-filename">{file.name}</p>
                                        <div className="preview-actions">
                                            <label className="btn-secondary">
                                                <input type="file" accept="image/*" onChange={handleFileChange} />
                                                Change Photo
                                            </label>
                                            <button className="btn-primary" onClick={handleUpload} disabled={loading}>
                                                {loading ? (
                                                    <span className="spinner-text"><span className="spinner"></span> Analyzing...</span>
                                                ) : "Analyze Image Now"}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <label className="drop-zone-content">
                                    <input type="file" accept="image/*" onChange={handleFileChange} />
                                    <div className="drop-icon">📷</div>
                                    <p className="drop-title">Drag & drop your photo here</p>
                                    <p className="drop-subtitle">or click to browse</p>
                                    <span className="drop-formats">Supports JPG, PNG, WEBP</span>
                                </label>
                            )}
                        </div>
                        {error && (
                            <div className="error-banner">
                                <span>⚠️</span> {error}
                            </div>
                        )}
                    </section>
                )}

                {/* Results Section - shown after analysis */}
                {result && (
                    <React.Fragment>
                        <section className="hero">
                            <div className="hero-content">
                                <div className="tag">Analysis Complete</div>
                                <h1>Composition Analysis</h1>
                                <p>Your image has been processed by the backend and saved to the Database ID #{result.id}.</p>
                                <div className="stats-row">
                                    <div className="stat-item">
                                        <span className="stat-value">{result.balanceScore}%</span>
                                        <span className="stat-label">Balance Score</span>
                                    </div>
                                    <div className="stat-item">
                                        <span className="stat-value">{result.compositionType}</span>
                                        <span className="stat-label">Composition Type</span>
                                    </div>
                                </div>
                            </div>
                            <div className="hero-image-wrapper">
                                <img src={preview} alt="Analyzed Photo" className="hero-img" />
                                <div className="image-overlay-grid"></div>
                                <div className="focus-point focus-tree"></div>
                            </div>
                        </section>

                        <section id="analysis" className="analysis-section fade-in visible">
                            <h2>Backend Real-Life Results</h2>
                            <div className="cards-grid">
                                <div className="glass-card">
                                    <div className="card-icon">⚖️</div>
                                    <h3>Balance</h3>
                                    <p>{result.balanceRemarks}</p>
                                </div>
                                <div className="glass-card">
                                    <div className="card-icon">↗️</div>
                                    <h3>Leading Lines</h3>
                                    <p>{result.linesRemarks}</p>
                                </div>
                                <div className="glass-card">
                                    <div className="card-icon">🏔️</div>
                                    <h3>Layering & Depth</h3>
                                    <p>Our analysis engine detected multiple depth layers, contributing to a strong three-dimensional visual experience.</p>
                                </div>
                                <div className="glass-card">
                                    <div className="card-icon">🎞️</div>
                                    <h3>Cinematic Mood</h3>
                                    <p>The overall tonal quality and lighting conditions produce a compelling, atmospheric aesthetic.</p>
                                </div>
                            </div>
                        </section>

                        <section id="suggestions" className="suggestions-section fade-in visible">
                            <h2>Actionable Suggestions</h2>
                            <div className="suggestions-list">
                                <div className="suggestion-item glass-card horizontal">
                                    <div className="suggestion-number">01</div>
                                    <div className="suggestion-content">
                                        <h3>Shift the Horizon Line</h3>
                                        <p>Try cropping to place the horizon on the upper or lower third for a more dynamic feel.</p>
                                    </div>
                                </div>
                                <div className="suggestion-item glass-card horizontal">
                                    <div className="suggestion-number">02</div>
                                    <div className="suggestion-content">
                                        <h3>Enhance the Foreground</h3>
                                        <p>Getting lower to include a distinct foreground object can drastically increase the sense of scale.</p>
                                    </div>
                                </div>
                                <div className="suggestion-item glass-card horizontal">
                                    <div className="suggestion-number">03</div>
                                    <div className="suggestion-content">
                                        <h3>Tweak Contrast to Guide the Eye</h3>
                                        <p>Add a subtle vignette in editing to force the eye center-ward and separate foreground from background.</p>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </React.Fragment>
                )}
            </main>

            <footer>
                <p>&copy; 2026 VisionAI. Engineered for Visual Excellence.</p>
            </footer>
        </React.Fragment>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
